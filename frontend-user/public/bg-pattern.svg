<svg width="400" height="400" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- Transparent Background -->
    
    <!-- Sketch Style Sweets Pattern -->
    <!-- Stroke: Brand Secondary (#7C2D12), Opacity: 0.15 for subtle background -->
    <g fill="none" stroke="#7C2D12" stroke-width="1" opacity="0.15" stroke-linecap="round" stroke-linejoin="round">
        
        <!-- 1. Murukku (Spiral Stack) - Top Left -->
        <g transform="translate(30, 30) scale(0.6)">
            <!-- Coils -->
            <path d="M10,20 C5,15 5,35 15,35 C25,35 30,15 20,10 C10,5 0,20 5,30 C10,40 30,40 35,30" />
            <path d="M12,18 C10,16 8,24 14,24" /> <!-- Inner detail -->
        </g>

        <!-- 2. Mysore Pak (Rectangular Blocks) - Top Right -->
        <g transform="translate(130, 20) scale(0.6)">
            <!-- Stack of blocks -->
            <path d="M10,10 L30,10 L35,15 L15,15 Z" /> <!-- Top face -->
            <path d="M10,10 L10,30 L30,30 L30,10" /> <!-- Front face -->
            <path d="M30,10 L35,15 L35,35 L30,30" /> <!-- Side face -->
            <!-- Second block behind/below -->
            <path d="M0,20 L10,20 L10,40 L0,40 Z" />
            <path d="M0,20 L5,15 L15,15" />
        </g>

        <!-- 3. Mixture Bowl - Bottom Left -->
        <g transform="translate(20, 130) scale(0.6)">
            <!-- Bowl -->
            <path d="M5,20 Q25,45 45,20" />
            <path d="M5,20 L45,20" />
            <!-- Mixture Scribbles -->
            <path d="M10,18 L15,10 M20,19 L25,5 M30,18 L28,8 M35,19 L40,12" />
            <path d="M12,15 Q25,5 38,15" />
        </g>

        <!-- 4. Laddu Plate - Bottom Right -->
        <g transform="translate(130, 130) scale(0.6)">
            <!-- Bottom Row -->
            <circle cx="10" cy="30" r="8" />
            <circle cx="26" cy="30" r="8" />
            <circle cx="42" cy="30" r="8" />
            <!-- Middle Row -->
            <circle cx="18" cy="18" r="8" />
            <circle cx="34" cy="18" r="8" />
            <!-- Top Row -->
            <circle cx="26" cy="6" r="8" />
            <!-- Plate base -->
            <path d="M0,38 Q26,48 52,38" />
        </g>

        <!-- 5. Repeat Murukku (Center) -->
         <g transform="translate(80, 80) scale(0.5)">
            <path d="M10,20 C5,15 5,35 15,35 C25,35 30,15 20,10 C10,5 0,20 5,30" />
        </g>

        <!-- 6. WhatsApp Icon (Subtle) - Middle Right -->
        <g transform="translate(140, 75) scale(0.4)">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.414 0 0 5.414 0 12.05c0 2.123.553 4.197 1.603 6.02L0 24l6.137-1.611a11.787 11.787 0 005.912 1.599h.005c6.634 0 12.048-5.414 12.048-12.05 0-3.218-1.253-6.243-3.528-8.517" />
        </g>
    </g>
